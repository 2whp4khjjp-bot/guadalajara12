name: Sync iCal Calendar

on:
  schedule:
  - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Sincronizar iCal
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
        run: node scripts/sync-ical.js

      - name: Commit y push de dates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dates.json
          git diff --staged --quiet || git commit -m "🗓️ Sync iCal $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
